<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Yayoi Kusama – Au coeur des obsessions</title>
    <link rel="icon" href="images/favicon.png" type="image/png">
    <!-- Google Fonts used for the headings and body -->
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="circles">
        <!-- Decorative circles are generated by `style.js` to match the interactive layout.
             Kept as a top-level element so it acts as an animated page background. test
        -->
    </div>

    <main class="hero">
        <div class="hero-content">
            <h1 class="title">Yayoi Kusama :</h1>
            <h2 class="subtitle">Au cœur des obsessions</h2>
            <p class="lead">Plongez dans l'expérience immersive</p>

                        <button class="scroll-down" aria-label="Descendre">
                                <!-- Inline SVG arrow (white stroke). Layout and rotation controlled by CSS -->
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 49 49" fill="none" aria-hidden="true">
                                    <path d="M1.5 24.0415L24.3219 46.8634M47.1438 24.0415L24.3219 46.8634M24.3219 46.8634L24.3219 1.50021" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                                </svg>
                        </button>
        </div>
    </main>

    <section id="chapitrage" class="next-section chapters">
        <div class="hero-content">

            <div class="chap-list" role="list">
                <a href="chap1.html" class="chap-item" id="chap1-link" role="listitem">
                    <span class="num-circle num-1">1</span>
                    <span class="chap-title">Les origines et les premières visions</span>
                </a>

                <a href="chap2-video.html" class="chap-item" id="chap2-link" role="listitem">
                    <span class="num-circle num-2">2</span>
                    <span class="chap-title">Un combat artistique</span>
                </a>

                <a href="chap3-video.html" class="chap-item" id="chap3-link" role="listitem">
                    <span class="num-circle num-3">3</span>
                    <span class="chap-title">L'infini et la folie</span>
                </a>

                <a href="chap4-video.html" class="chap-item" id="chap4-link" role="listitem">
                    <span class="num-circle num-4">4</span>
                    <span class="chap-title">La reconnaissance finale</span>
                </a>
            </div>
        </div>
    </section>

    <button class="fullscreen-btn" id="fullscreen-btn" type="button" aria-label="Activer le plein écran" title="Plein écran" data-tooltip="Plein écran">
        <span class="fullscreen-btn__icon" aria-hidden="true"></span>
    </button>

    <div class="page-fade" aria-hidden="true"></div>
    <script src="style.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const fullscreenBtn = document.getElementById('fullscreen-btn');

            function setFullscreenLabel() {
                if (!fullscreenBtn) return;
                const isFullscreen = Boolean(document.fullscreenElement);
                fullscreenBtn.setAttribute('aria-label', isFullscreen ? 'Quitter le plein écran' : 'Activer le plein écran');
                fullscreenBtn.setAttribute('title', isFullscreen ? 'Quitter le plein écran' : 'Plein écran');
                fullscreenBtn.setAttribute('data-tooltip', isFullscreen ? 'Quitter' : 'Plein écran');
                fullscreenBtn.classList.toggle('is-fullscreen', isFullscreen);
            }

            if (fullscreenBtn) {
                fullscreenBtn.addEventListener('click', async () => {
                    try {
                        if (!document.fullscreenElement) {
                            await document.documentElement.requestFullscreen();
                        } else {
                            await document.exitFullscreen();
                        }
                    } catch (_) {}
                    setFullscreenLabel();
                });

                document.addEventListener('fullscreenchange', setFullscreenLabel);
                setFullscreenLabel();
            }
        });
    </script>
</body>
</html>
