<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Yayoi Kusama – Au coeur des obsessions</title>
    <!-- Google Fonts used for the headings and body -->
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="hero">
        <div class="circles">
            <!-- Decorative circles positioned with CSS and animated by JS -->
            <div class="circle c-red c-large" style="--x:85%; --y:6%;"></div>
            <div class="circle c-green c-medium" style="--x:60%; --y:12%;"></div>
            <div class="circle c-yellow c-large" style="--x:92%; --y:78%;"></div>
            <div class="circle c-blue c-medium" style="--x:78%; --y:86%;"></div>
            <div class="circle c-red c-medium" style="--x:8%; --y:88%;"></div>
            <div class="circle c-green c-small" style="--x:22%; --y:66%;"></div>
            <div class="circle c-blue c-small" style="--x:6%; --y:22%;"></div>
            <div class="circle c-yellow c-small" style="--x:48%; --y:74%;"></div>
            <div class="circle c-red c-small" style="--x:24%; --y:8%;"></div>
            <div class="circle c-blue c-small" style="--x:74%; --y:36%;"></div>
        </div>

        <div class="hero-content">
            <h1 class="title">Yayoi Kusama :</h1>
            <h2 class="subtitle">Au cœur des obsessions</h2>
            <p class="lead">Plongez dans l'expérience immersive</p>

            <button class="scroll-down" aria-label="Descendre">
                <span class="arrow">↓</span>
            </button>
        </div>
    </main>

    <section id="next" class="next-section">
        <!-- Placeholder for further content -->
        <h3>En savoir plus</h3>
        <p>Contenu à venir...</p>
    </section>

    <script src="style.js"></script>
</body>
</html>
