<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Yayoi Kusama – Au coeur des obsessions</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400&family=Afacad:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="interraction_jeu4.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/examples/jsm/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <main class="viewer-page" aria-label="Interaction 3D">
    <p class="hint">Manipulez l'oeuvre emblématique de Kusama à votre guise !</p>
    <div id="viewer" class="viewer" aria-label="Modèle 3D citrouille"></div>

    <div class="controls">
      <button id="openWebcam" class="action-btn" type="button">Faites venir l'univers de Kusama à vous !</button>
    </div>

    <p class="viewer-note">Il s'agit d'une reproduction de l'oeuvre originale. Tout droit réservé ©YAYOI KUSAMA.</p>
  </main>

  <a id="nextBtn" class="next-btn" href="conclu-video.html" aria-label="Suivant">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 49 49" fill="none" aria-hidden="true">
      <path d="M1.5 24.0415L24.3219 46.8634M47.1438 24.0415L24.3219 46.8634M24.3219 46.8634L24.3219 1.50021" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
    </svg>
  </a>

  <div id="webcamModal" class="info-modal info-modal--porte" aria-hidden="true">
    <div class="info-modal__dialog" role="dialog" aria-modal="true" aria-label="Autorisation webcam">
      <button id="webcamClose" class="info-modal__close" type="button" aria-label="Fermer"></button>
      <h2 class="info-modal__question">Activer la webcam ?</h2>
      <p class="info-modal__text">Autorisez l'acces a votre webcam pour vous prendre en photo avec le filtre.</p>
      <div class="info-modal__actions" role="group" aria-label="Choix">
        <button id="webcamAllow" class="info-modal__btn" type="button">Autoriser</button>
        <button id="webcamDeny" class="info-modal__btn" type="button">Refuser</button>
      </div>
    </div>
  </div>

  <div id="webcamLayer" class="webcam-layer" aria-hidden="true">
    <video id="webcamVideo" class="webcam-video" autoplay playsinline muted></video>
    <img id="webcamFilter" class="webcam-filter" src="images/filtre 1.png" alt="" aria-hidden="true">

    <button id="webcamBack" class="webcam-back-btn" type="button" aria-label="Retour à la citrouille">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 49 49" fill="none" aria-hidden="true">
        <path d="M1.5 24.0415L24.3219 46.8634M47.1438 24.0415L24.3219 46.8634M24.3219 46.8634L24.3219 1.50021" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
      </svg>
    </button>
    
    <div class="webcam-controls" aria-hidden="true">
      <button id="takePhoto" class="webcam-btn webcam-btn--large" type="button" aria-label="Prendre une photo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 81 65" fill="none" aria-hidden="true">
          <path d="M80.5153 16.3862V54.2091C79.3432 59.4896 74.9766 64.4632 69.1639 64.4643L11.2382 64.47C5.63494 64.47 1.36683 59.8044 0 54.7753V15.82C1.4461 10.3017 6.03581 6.04261 11.921 6.0177L22.2883 5.97467L22.3348 4.01105C22.3835 1.97835 24.235 0.0396394 26.4024 0.0373746L53.5545 4.63917e-06C56.0572 -0.00339263 58.0537 1.85944 58.0876 4.38701L58.1091 5.98033L68.2658 6.00524C74.4681 6.0211 79.2605 10.5146 80.5153 16.3862ZM49.3782 53.1503C53.3643 51.1153 56.4366 47.8992 58.3288 43.9074C60.793 38.7107 60.9357 32.8674 58.7184 27.562C56.6766 22.6745 52.9011 18.8866 48.0294 16.8199C42.6754 14.5494 36.7641 14.6989 31.5187 17.2026C27.3854 19.1753 24.1342 22.4163 22.14 26.5372C19.4618 32.0714 19.4358 38.3574 22.0675 43.9131C24.0595 48.1189 27.382 51.4448 31.5946 53.4356C37.2782 56.1206 43.7217 56.0391 49.3782 53.1525V53.1503ZM12.4578 15.9909C10.0412 16.2299 8.4626 18.3305 8.71173 20.6237C8.96086 22.9168 11.0071 24.5362 13.2878 24.2871C15.5368 24.0425 17.2162 22.0471 16.9988 19.7325C16.7814 17.4178 14.8325 15.7554 12.4578 15.9898V15.9909Z" fill="currentColor"/>
          <path d="M51.6272 46.7216C48.0906 50.2321 43.8542 51.7314 38.8569 51.3996C34.9251 51.138 31.4112 49.3828 28.6741 46.6117C25.7083 43.6097 24.1059 39.7617 24.0448 35.5265C23.9791 31.0149 25.7049 26.8929 28.8983 23.7583C31.9559 20.7551 35.8922 19.1335 40.2101 19.1369C44.528 19.1403 48.5629 20.8061 51.6317 23.8761C54.7006 26.9461 56.4332 31.0726 56.3687 35.5287C56.3064 39.8161 54.6598 43.7105 51.6272 46.7216Z" fill="currentColor"/>
        </svg>
      </button>
      
      <button id="webcamNext" class="webcam-btn webcam-btn--small" type="button" aria-label="Suivant">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 49 49" fill="none" aria-hidden="true">
          <path d="M1.5 24.0415L24.3219 46.8634M47.1438 24.0415L24.3219 46.8634M24.3219 46.8634L24.3219 1.50021" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <div class="webcam-gradient" aria-hidden="true"></div>
  </div>

  <div class="page-fade" aria-hidden="true"></div>

  <script type="module" src="interraction_jeu4.js"></script>
</body>
</html>
