  <script>
        document.addEventListener('DOMContentLoaded', () => {
            const fullscreenBtn = document.getElementById('fullscreen-btn');

            function setFullscreenLabel() {
                if (!fullscreenBtn) return;
                const isFullscreen = Boolean(document.fullscreenElement);
                fullscreenBtn.setAttribute('aria-label', isFullscreen ? 'Quitter le plein écran' : 'Activer le plein écran');
                fullscreenBtn.setAttribute('title', isFullscreen ? 'Quitter le plein écran' : 'Plein écran');
                fullscreenBtn.setAttribute('data-tooltip', isFullscreen ? 'Quitter' : 'Plein écran');
                fullscreenBtn.classList.toggle('is-fullscreen', isFullscreen);
            }

            if (fullscreenBtn) {
                fullscreenBtn.addEventListener('click', async () => {
                    try {
                        if (!document.fullscreenElement) {
                            await document.documentElement.requestFullscreen();
                        } else {
                            await document.exitFullscreen();
                        }
                    } catch (_) {}
                    setFullscreenLabel();
                });

                document.addEventListener('fullscreenchange', setFullscreenLabel);
                setFullscreenLabel();
            }
        });
    </script>
